version: '3.8'

services:

  web:
    build: ./app
    ports:
      - "${WEB_PORT}:80"
    environment:
      - AMBIENTE=${AMBIENTE}
    networks:
      - sirius-network
    depends_on:
      - db

  api:
    build: ./api
    ports:
      - "${API_PORT}:5000"
    environment:
      - AMBIENTE=${AMBIENTE}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - sirius-network
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sirius-network

networks:
  sirius-network:
    driver: bridge

volumes:
  postgres_data:

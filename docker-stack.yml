version: '3.8'

services:

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    networks:
      - sirius-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  api:
    image: nginx:alpine
    ports:
      - "8081:80"
    networks:
      - sirius-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=sirius_db
      - POSTGRES_USER=sirius_user
      - POSTGRES_PASSWORD=sirius_pass_2024
    networks:
      - sirius-network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  sirius-network:
    driver: overlay